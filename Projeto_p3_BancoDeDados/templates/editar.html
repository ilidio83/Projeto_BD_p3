<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Editar Produto #{{ produto[0] }}</h1>

    <form action="/atualizar" method="POST">
        <input type="hidden" name="id" value="{{ produto[0] }}">

        <input type="text" name="nome" value="{{ produto[1] }}" required>
        <input type="number" name="quantidade" value="{{ produto[2] }}" required>
        <input type="number" step="0.01" name="preco" value="{{ produto[3] }}" required>

        <button type="submit">Salvar Alterações</button>
    </form>

    <a href="/" style="color: #00e5ff; text-decoration: none; margin-top: 20px;">← Voltar para o Estoque</a>
</body>
</html>
