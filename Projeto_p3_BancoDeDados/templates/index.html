<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Pequenos ajustes para os botões da tabela */
        .btn-pequeno { padding: 6px 12px; font-size: 12px; margin-right: 5px; }
        .btn-perigo { background-color: #ff4444; }
        .btn-perigo:hover { background-color: #cc0000; }
        .acoes { display: flex; gap: 5px; }
    </style>
</head>
<body>
    <h1>Estoque Central</h1>

    <form action="/adicionar" method="POST">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="number" name="quantidade" placeholder="Qtd" required>
        <input type="number" step="0.01" name="preco" placeholder="Preço" required>
        <button type="submit">Adicionar Item</button>
    </form>

    <form action="/dar_desconto_item" method="POST" style="border: 1px solid #ff4444;">
        <input type="number" name="id" placeholder="ID do Produto" required>
        <input type="number" step="0.1" name="percentual" placeholder="Desconto (%)" required>
        <button type="submit" style="background-color: #ff4444; color: white;">Aplicar Desconto</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Preço Unit.</th>
                <th>Valor Total</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for prod in produtos %}
            <tr>
                <td>#{{ prod[0] }}</td>
                <td>{{ prod[1] }}</td>
                <td>{{ prod[2] }} un</td>
                <td>R$ {{ "%.2f"|format(prod[3]) }}</td>
                <td style="color: #00e5ff;">R$ {{ "%.2f"|format(prod[4]) }}</td>
                <td class="acoes">
                    <a href="/editar/{{ prod[0] }}">
                        <button type="button" class="btn-pequeno">Editar</button>
                    </a>

                    <form action="/deletar/{{ prod[0] }}" method="POST" style="padding: 0; margin: 0; box-shadow: none; background: transparent;">
                        <button type="submit" class="btn-pequeno btn-perigo" onclick="return confirm('Tem certeza que deseja deletar?');">X</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
